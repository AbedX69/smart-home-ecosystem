; =============================================================================
; ESP-MESH Test - PlatformIO Configuration
; =============================================================================
;
; BUILD FLAGS FOR MODE SELECTION:
;   -DMESH_MODE_ROOT     → Root node (connects to router, bridges mesh)
;   -DMESH_MODE_NODE     → Regular node (joins mesh, can relay)
;   -DMESH_MODE_LEAF     → Leaf node (joins mesh, no children, simulates battery device)
;
; ROOT NODE SETUP:
;   Set your router credentials via build_flags:
;     -DMESH_ROUTER_SSID=\"YourWiFi\"
;     -DMESH_ROUTER_PASS=\"YourPassword\"
;
; EXAMPLE - ROOT:
;   build_flags =
;       -DMESH_MODE_ROOT
;       -DMESH_ROUTER_SSID=\"MyHomeWiFi\"
;       -DMESH_ROUTER_PASS=\"password123\"
;
; EXAMPLE - NODE (default):
;   build_flags =
;       -DMESH_MODE_NODE
;
; ============================================================================= 
[platformio]
default_envs = esp32d
src_dir = main

[env]
framework = espidf
monitor_speed = 115200
build_flags =
    -DMESH_MODE_NODE
    -DMESH_ROUTER_SSID=\"AbedX69\"
    -DMESH_ROUTER_PASS=\"sixnine69\"

[env:esp32d]
platform = espressif32
board = esp32dev
build_flags =
    -DMESH_MODE_ROOT
    -DMESH_ROUTER_SSID=\"AbedX69\"
    -DMESH_ROUTER_PASS=\"sixnine69\"

[env:c6_seeed]
platform = espressif32
board = seeed_xiao_esp32c6
board_build.partitions = partitions_large.csv

[env:c6]
platform = espressif32
board = esp32-c6-devkitc-1
board_build.partitions = partitions_large.csv

[env:s3_seeed]
platform = espressif32
board = seeed_xiao_esp32s3

[env:s3_wroom]
platform = espressif32
board = esp32-s3-devkitc-1 