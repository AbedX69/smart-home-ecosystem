; =============================================================================
; WiFi Manager Test - PlatformIO Configuration
; =============================================================================
;
; BUILD FLAGS FOR MODE SELECTION:
;   -DWIFI_TEST_STA       → Connect to router (set WIFI_SSID/WIFI_PASS)
;   -DWIFI_TEST_AP        → Start as access point
;   -DWIFI_TEST_CAPTIVE   → Captive portal for WiFi setup (default)
;   -DWIFI_TEST_NVS       → Load from NVS with AP fallback
;
; For STA mode, set your WiFi credentials:
;   build_flags = -DWIFI_TEST_STA
;                 -DWIFI_SSID=\"YourNetworkName\"
;                 -DWIFI_PASS=\"YourPassword\"
;
; =============================================================================

[platformio]
default_envs = esp32d
src_dir = main

[env]
framework = espidf
monitor_speed = 115200
build_flags =
    -DWIFI_TEST_NVS
    -DWIFI_AP_SSID=\"ESP32-SmartHome\"
    -DWIFI_HOSTNAME=\"esp32-device\"

; Partition table with OTA support (required for OTA updates)
; board_build.partitions = default_ota.csv

; =============================================================================
; Board Definitions
; =============================================================================

[env:esp32d]
platform = espressif32
board = esp32dev
board_build.partitions = partitions_two_ota.csv 

[env:s3_wroom]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.partitions = partitions_two_ota.csv 

[env:s3_seeed]
platform = espressif32
board = seeed_xiao_esp32s3
board_build.partitions = partitions_two_ota.csv 

[env:c6_wroom]
platform = espressif32
board = esp32-c6-devkitc-1
board_build.partitions = partitions_two_ota.csv 

[env:c6_seeed]
platform = espressif32
board = seeed_xiao_esp32c6
board_build.partitions = partitions_two_ota.csv 