; =============================================================================
; LoRa SX1262 Test - PlatformIO Configuration
; =============================================================================
;
; HARDWARE: XIAO ESP32-S3 + Wio-SX1262 (B2B connector kit)
;
; This test ONLY works on boards with an SX1262 connected.
; The default pin preset is for the Seeed XIAO S3 + Wio-SX1262 kit.
;
; MODES (set in build_flags):
;   -DLORA_TEST_TX       → Sensor beacon transmitter (default)
;   -DLORA_TEST_RX       → Gateway receiver
;   -DLORA_TEST_PINGPONG → Range test (flash 2 devices)
;
; FREQUENCY:
;   Default is 915 MHz (US ISM). Change in main.cpp for your region:
;     EU: 868000000
;     US: 915000000
;     AU: 915000000
;     AS: 433000000
;
; =============================================================================

[platformio]
default_envs = s3_seeed

[env]
framework = espidf
monitor_speed = 115200
lib_extra_dirs = ../../communication

build_flags =
    -DLORA_TEST_TX
    ; -DLORA_TEST_RX
    ; -DLORA_TEST_PINGPONG

; ── Primary target: XIAO ESP32-S3 + Wio-SX1262 kit ──
[env:s3_seeed]
platform = espressif32
board = seeed_xiao_esp32s3

; ── ESP32-S3 devkit with external SX1262 module (custom pins needed) ──
[env:s3_wroom]
platform = espressif32
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    ; Override pins if wiring SX1262 to different GPIOs:
    ; See lora_sx1262.h LoRaPinPresets or pass custom LoRaPins
