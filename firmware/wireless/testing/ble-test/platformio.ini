; =============================================================================
; BLE Manager Test - PlatformIO Configuration (NimBLE)
; =============================================================================
;
; BUILD FLAGS FOR MODE SELECTION:
;   -DBLE_TEST_SERVER    → BLE peripheral with GATT services (default)
;   -DBLE_TEST_CLIENT    → BLE central, scans and connects
;   -DBLE_TEST_SCANNER   → Scan-only, prints all found devices
;
; =============================================================================

[platformio]
default_envs = esp32d

[env]
framework = espidf
monitor_speed = 115200
lib_extra_dirs = ../../communication
build_flags =
    -DBLE_TEST_SERVER
    -DBLE_DEVICE_NAME=\"ESP32-SmartHome\"

; CRITICAL: Enable NimBLE instead of Bluedroid
; This is done via sdkconfig. The settings below are applied automatically.
; If you have issues, run: pio run -t menuconfig
;   → Component config → Bluetooth → Host → NimBLE

[env:esp32d]
platform = espressif32
board = esp32dev
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults

[env:s3_wroom]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults

[env:s3_seeed]
platform = espressif32
board = seeed_xiao_esp32s3
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults

[env:c6_wroom]
platform = espressif32
board = esp32-c6-devkitc-1
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults

[env:c6_seeed]
platform = espressif32
board = seeed_xiao_esp32c6
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults
