; =============================================================================
; ESP-NOW Test - PlatformIO Configuration
; =============================================================================
;
; BUILD FLAGS FOR MODE SELECTION:
;   -DESPNOW_MODE_SENDER     → Sends periodic messages
;   -DESPNOW_MODE_RECEIVER   → Listens only
;   -DESPNOW_MODE_ECHO       → Receives and echoes back (default)
;
; To set the peer MAC address at build time:
;   build_flags = -DESPNOW_MODE_SENDER
;                 -DPEER_MAC_0=0xAA -DPEER_MAC_1=0xBB -DPEER_MAC_2=0xCC
;                 -DPEER_MAC_3=0xDD -DPEER_MAC_4=0xEE -DPEER_MAC_5=0xFF
;
; =============================================================================

[platformio]
default_envs = esp32d

[env]
framework = espidf
monitor_speed = 115200
lib_extra_dirs = ../../communication
build_flags =
    -DESPNOW_MODE_ECHO

; =============================================================================
; Board Definitions
; =============================================================================

[env:esp32d]
platform = espressif32
board = esp32dev

[env:s3_wroom]
platform = espressif32
board = esp32-s3-devkitc-1

[env:s3_seeed]
platform = espressif32
board = seeed_xiao_esp32s3

[env:c6_wroom]
platform = espressif32
board = esp32-c6-devkitc-1

[env:c6_seeed]
platform = espressif32
board = seeed_xiao_esp32c6
