; =============================================================================
; Zigbee Manager Test - PlatformIO Configuration
; =============================================================================
;
; HARDWARE: ESP32-C6 ONLY (requires 802.15.4 radio)
;           Also works on ESP32-H2 and ESP32-C5.
;
; MODES:
;   env:c6_light       → On/Off light (End Device)
;   env:c6_dimmable    → Dimmable light (Router)
;   env:c6_temp        → Temperature sensor (End Device)
;   env:c6_coordinator → Network coordinator
;
; TESTING WORKFLOW:
;   1. Flash c6_coordinator on board A
;   2. Flash c6_light on board B
;   3. Power A first, then B
;   4. B should auto-join A's network
;   5. Use Zigbee2MQTT / ZHA to control
;
; IMPORTANT:
;   - Coordinator and Router use sdkconfig.coordinator (CONFIG_ZB_ZCZR)
;   - End Devices use sdkconfig.defaults (CONFIG_ZB_ZED)
;   - These CANNOT be mixed in one binary
;
; =============================================================================

[platformio]
default_envs = c6_light

[env]
framework = espidf
platform = espressif32
board = esp32-c6-devkitc-1
monitor_speed = 115200
lib_extra_dirs = ../../communication
board_build.partitions = partitions.csv

; ── On/Off Light (End Device) ──
[env:c6_light]
build_flags =
    -DZB_TEST_ONOFF_LIGHT
    -DLED_PIN=15
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults

; ── Dimmable Light (Router) ──
[env:c6_dimmable]
build_flags =
    -DZB_TEST_DIMMABLE
    -DLED_PIN=15
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.coordinator

; ── Temperature Sensor (End Device) ──
[env:c6_temp]
build_flags =
    -DZB_TEST_TEMP_SENSOR
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults

; ── Coordinator ──
[env:c6_coordinator]
build_flags =
    -DZB_TEST_COORDINATOR
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.coordinator
