; =============================================================================
; System Integration Test - Device Registry + Config Store
; =============================================================================
;
; Flash different roles on different boards, power them all on,
; and watch them discover each other in the serial monitor.
;
; TESTING:
;   1. pio run -e esp32d_controller -t upload   (board A)
;   2. pio run -e esp32d_light -t upload         (board B)
;   3. pio run -e esp32d_sensor -t upload        (board C - optional)
;   4. Open serial monitors on all boards
;   5. Watch devices discover each other within 5-10 seconds
;
; =============================================================================

[platformio]
default_envs = esp32d_light

[env]
framework = espidf
monitor_speed = 115200
lib_extra_dirs =
    ../../system
    ../../communication

; ── ESP32-D boards ──

[env:esp32d_controller]
platform = espressif32
board = esp32dev
build_flags = -DSYS_TEST_CONTROLLER

[env:esp32d_light]
platform = espressif32
board = esp32dev
build_flags = -DSYS_TEST_LIGHT

[env:esp32d_sensor]
platform = espressif32
board = esp32dev
build_flags = -DSYS_TEST_SENSOR

; ── ESP32-S3 boards ──

[env:s3_controller]
platform = espressif32
board = esp32-s3-devkitc-1
build_flags = -DSYS_TEST_CONTROLLER

[env:s3_light]
platform = espressif32
board = esp32-s3-devkitc-1
build_flags = -DSYS_TEST_LIGHT

; ── Seeed XIAO S3 ──

[env:s3_seeed_light]
platform = espressif32
board = seeed_xiao_esp32s3
build_flags = -DSYS_TEST_LIGHT

; ── ESP32-C6 ──

[env:c6_controller]
platform = espressif32
board = esp32-c6-devkitc-1
build_flags = -DSYS_TEST_CONTROLLER

[env:c6_sensor]
platform = espressif32
board = esp32-c6-devkitc-1
build_flags = -DSYS_TEST_SENSOR
