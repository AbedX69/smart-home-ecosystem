; =============================================================================
; OTA Manager Test - PlatformIO Configuration
; =============================================================================
;
; CRITICAL: OTA requires a partition table with ota_0 + ota_1 slots.
;           The default "single factory" partition will NOT work.
;
; BUILD FLAGS FOR MODE SELECTION:
;   -DOTA_TEST_WEBUI     → WiFi AP + web upload page (default)
;   -DOTA_TEST_PULL      → WiFi STA + check server for updates
;   -DOTA_TEST_ROLLBACK  → Demo rollback validation timeout
;
; SET FIRMWARE VERSION:
;   The version comes from PROJECT_VER or esp_app_desc.
;   Change build_flags -DPROJECT_VER to update it.
;
; =============================================================================

[platformio]
default_envs = esp32d
src_dir = main


[env]
framework = espidf
monitor_speed = 115200

; CRITICAL: Use OTA-compatible partition table
board_build.partitions = partitions_two_ota.csv
build_flags =
    -DOTA_TEST_WEBUI
    -DPROJECT_VER=\"1.2.0\"
    ; Uncomment and set for pull mode:
     -DWIFI_SSID=\"AbedX69\"
     -DWIFI_PASS=\"sixnine69\"
     -DOTA_UPDATE_URL=\"http://192.168.1.100:8080/firmware\"

; Enable rollback support
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults

[env:esp32d]
platform = espressif32
board = esp32dev

[env:s3_wroom]
platform = espressif32
board = esp32-s3-devkitc-1

[env:s3_seeed]
platform = espressif32
board = seeed_xiao_esp32s3

[env:c6_wroom]
platform = espressif32
board = esp32-c6-devkitc-1

[env:c6_seeed]
platform = espressif32
board = seeed_xiao_esp32c6
