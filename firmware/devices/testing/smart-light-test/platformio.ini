; =============================================================================
; Smart Light Bench Test - PlatformIO Configuration
; =============================================================================
;
; Bench-tests SmartLightRemote with 2 panels, 2 touch pads, 2 encoders,
; and 2 GC9A01 displays sharing one SPI bus.
;
; Default target is s3_wroom because the demo pins are ESP32-S3 specific.
; Other envs are provided for parity with the rest of the project.
;
; =============================================================================
 
[platformio]
default_envs = s3_wroom
src_dir = main

[env]
framework = espidf
monitor_speed = 115200
build_flags =
    -I../../modules/smart-light 
    -I../../../components/addressable
 
[env:esp32d] 
platform = espressif32
board = esp32dev

[env:c6_seeed]
platform = espressif32
board = seeed_xiao_esp32c6
board_build.partitions = partitions_large.csv

[env:c6]
platform = espressif32
board = esp32-c6-devkitc-1
board_build.partitions = partitions_large.csv

[env:s3_seeed]
platform = espressif32
board = seeed_xiao_esp32s3

[env:s3_wroom]
platform = espressif32
board = esp32-s3-devkitc-1
