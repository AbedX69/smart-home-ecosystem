; =============================================================================
; Garage Controller Bench Test - PlatformIO Configuration
; =============================================================================
;
; Bench-tests GarageDoorDevice with 2 buttons + 2 relays on a single ESP32.
;
; State machine and motor interlock are board-agnostic, so any of the boards
; below should work. Default is esp32d (cheapest, most common dev board).
;
; =============================================================================
 
[platformio]
default_envs = esp32d
src_dir = main
  
[env]
framework = espidf
monitor_speed = 115200

[env:esp32d]
platform = espressif32
board = esp32dev 

[env:c6_seeed]
platform = espressif32
board = seeed_xiao_esp32c6
board_build.partitions = partitions_large.csv

[env:c6]
platform = espressif32
board = esp32-c6-devkitc-1
board_build.partitions = partitions_large.csv

[env:s3_seeed]
platform = espressif32
board = seeed_xiao_esp32s3

[env:s3_wroom]
platform = espressif32
board = esp32-s3-devkitc-1
